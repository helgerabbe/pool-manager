# Phase 4 der Schülerbereich-Migration:
# Baut die App im Supabase-Modus (VITE_BACKEND=supabase) und deployt sie
# auf GitHub Pages. Der Lehrer-/Autorenbereich bleibt auf Base44 – dieser
# Build ist nur für den Schülerbereich (/lernen) gedacht.
#
# Voraussetzungen (einmalig im GitHub-Repo einrichten):
#   1. Settings → Pages → Source: "GitHub Actions"
#   2. Settings → Secrets and variables → Actions → Secrets:
#      - VITE_SUPABASE_URL       (Supabase Project URL)
#      - VITE_SUPABASE_ANON_KEY  (Supabase anon/public Key – NICHT der service_role!)

name: Schüler-App (Supabase) auf GitHub Pages

on:
  workflow_dispatch:        # manuell startbar über den Actions-Tab
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Abhängigkeiten installieren
        run: npm install

      - name: Build (Supabase-Modus)
        env:
          VITE_BACKEND: supabase
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        # --base: GitHub Pages liefert unter https://<user>.github.io/<repo>/
        run: npx vite build --base "/${{ github.event.repository.name }}/"

      - name: SPA-Fallback für GitHub Pages (404.html)
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4